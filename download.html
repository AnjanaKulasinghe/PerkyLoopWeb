<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Download the PerkyLoop app. Automatically sends you to the App Store or Google Play for your device.">
    <meta name="robots" content="noindex">
    <title>Download PerkyLoop</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/favicon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-heading: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
            color: #1f2937;
            background: linear-gradient(135deg, #f97316 0%, #ec4899 45%, #8b5cf6 100%);
            background-size: 200% 200%;
            animation: gradientShift 14s ease infinite;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Decorative floating blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.45;
            z-index: 0;
            pointer-events: none;
        }

        .blob-1 {
            width: 340px;
            height: 340px;
            background: #fbbf24;
            top: -80px;
            left: -60px;
            animation: float1 12s ease-in-out infinite;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: #06b6d4;
            bottom: -70px;
            right: -50px;
            animation: float2 15s ease-in-out infinite;
        }

        @keyframes float1 {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(30px, 40px);
            }
        }

        @keyframes float2 {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(-40px, -30px);
            }
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 32px;
            padding: 36px 32px 32px;
            box-shadow: 0 30px 70px rgba(76, 29, 149, 0.35);
            text-align: center;
            animation: rise 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo lockup — displayed at natural aspect ratio, no cropping */
        .logo {
            display: block;
            width: 148px;
            height: auto;
            margin: 0 auto 20px;
        }

        /* Phone mockup hero */
        .phone {
            display: block;
            width: 190px;
            height: auto;
            margin: 0 auto 24px;
            filter: drop-shadow(0 24px 40px rgba(76, 29, 149, 0.3));
            animation: floatPhone 5s ease-in-out infinite;
        }

        @keyframes floatPhone {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .rating {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f3e8ff;
            color: var(--primary-dark);
            font-size: 13px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 999px;
            margin-bottom: 18px;
        }

        .rating .stars {
            color: #f59e0b;
            letter-spacing: 1px;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: 27px;
            font-weight: 800;
            line-height: 1.2;
            color: #111827;
            margin-bottom: 10px;
        }

        p.subtitle {
            font-size: 15.5px;
            color: #6b7280;
            line-height: 1.55;
            margin-bottom: 24px;
            padding: 0 4px;
        }

        .status {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-dark);
            min-height: 20px;
            margin-bottom: 18px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2.5px solid rgba(124, 58, 237, 0.25);
            border-top-color: var(--primary-dark);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .store-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 15px 22px;
            border-radius: 16px;
            background: #111827;
            color: #fff;
            text-decoration: none;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .store-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 28px rgba(17, 24, 39, 0.35);
        }

        .store-button:active {
            transform: translateY(-1px);
        }

        .store-button svg {
            flex-shrink: 0;
        }

        .store-text {
            text-align: left;
            line-height: 1.15;
        }

        .store-label {
            font-size: 11px;
            opacity: 0.85;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            font-weight: 500;
        }

        .store-name {
            font-size: 19px;
            font-weight: 600;
            font-family: var(--font-heading);
        }

        /* Highlight the recommended store for the detected device */
        .store-button.highlight {
            background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 100%);
            box-shadow: 0 12px 26px rgba(124, 58, 237, 0.45);
        }

        .store-button.dimmed {
            background: #1f2937;
            opacity: 0.55;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #9ca3af;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 20px 0 4px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .home-link {
            display: inline-block;
            margin-top: 18px;
            font-size: 14px;
            font-weight: 500;
            color: var(--primary-dark);
            text-decoration: none;
        }

        .home-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 400px) {
            .card {
                padding: 30px 22px 26px;
            }

            h1 {
                font-size: 24px;
            }

            .phone {
                width: 168px;
            }
        }
    </style>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main class="card">
        <img src="images/icon.png" alt="PerkyLoop" class="logo">
        <img src="images/front.png" alt="PerkyLoop app preview" class="phone" loading="lazy">

        <div class="rating">
            <span class="stars">★★★★★</span>
            <span>Loved by Kiwi shoppers</span>
        </div>

        <h1>Get the PerkyLoop App</h1>
        <p class="subtitle">Digital loyalty rewards from your favourite local shops — all in one place.</p>

        <div class="status" id="status"></div>

        <div class="buttons" id="buttons">
            <a href="https://apps.apple.com/nz/app/perkyloop/id6760283390" class="store-button" data-store="apple">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path
                        d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z" />
                </svg>
                <div class="store-text">
                    <div class="store-label">Download on the</div>
                    <div class="store-name">App Store</div>
                </div>
            </a>
            <a href="https://play.google.com/store/apps/details?id=nz.co.koungasolutions.perkyloop" class="store-button"
                data-store="google">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path
                        d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z" />
                </svg>
                <div class="store-text">
                    <div class="store-label">Get it on</div>
                    <div class="store-name">Google Play</div>
                </div>
            </a>
        </div>

        <a href="index.html" class="home-link">Visit PerkyLoop.com →</a>
    </main>

    <script>
        (function () {
            var APP_STORE_URL = 'https://apps.apple.com/nz/app/perkyloop/id6760283390';
            var PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=nz.co.koungasolutions.perkyloop';

            var ua = navigator.userAgent || navigator.vendor || window.opera || '';
            var statusEl = document.getElementById('status');
            var appleBtn = document.querySelector('.store-button[data-store="apple"]');
            var googleBtn = document.querySelector('.store-button[data-store="google"]');

            // Detect iOS (including iPadOS which reports as Mac with touch support).
            var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            var isAndroid = /android/i.test(ua);

            function showRedirecting(storeName) {
                statusEl.innerHTML = '<span class="spinner"></span>Taking you to the ' + storeName + '\u2026';
            }

            if (isAndroid) {
                googleBtn.classList.add('highlight');
                appleBtn.classList.add('dimmed');
                showRedirecting('Google Play Store');
                window.location.replace(PLAY_STORE_URL);
            } else if (isIOS) {
                appleBtn.classList.add('highlight');
                googleBtn.classList.add('dimmed');
                showRedirecting('App Store');
                window.location.replace(APP_STORE_URL);
            } else {
                statusEl.textContent = 'Choose your platform to download:';
            }
        })();
    </script>
</body>

</html>
